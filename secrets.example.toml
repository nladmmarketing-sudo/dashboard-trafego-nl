# Modelo de secrets — copiar para .streamlit/secrets.toml (local)
# ou colar no Streamlit Cloud em App → Settings → Secrets.

[supabase]
url = "https://SEU-PROJETO.supabase.co"
key = "sb_secret_SUA_SERVICE_KEY"

[app]
senha = "defina-uma-senha-forte"

[meta]
token = ""                          # token Graph API (Marketing API, ads_read)
conta = "act_000000000000000"       # conta de anúncios
